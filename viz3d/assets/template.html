<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D场景预览</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #0a0a0f;
  overflow: hidden;
}
canvas { display: block; }
#info {
  position: absolute;
  top: 16px;
  right: 16px;
  background: rgba(20, 20, 35, 0.9);
  padding: 16px;
  border-radius: 8px;
  color: #ccc;
  font-size: 13px;
  max-width: 280px;
  border: 1px solid rgba(255,255,255,0.1);
}
#info h3 {
  color: #fff;
  margin-bottom: 8px;
  font-size: 15px;
}
#info .section {
  margin-top: 12px;
  padding-top: 8px;
  border-top: 1px solid rgba(255,255,255,0.1);
}
#info .label {
  color: #888;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 4px;
}
#info .item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 3px 0;
  font-size: 12px;
}
#info .color-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
#info .warning {
  margin-top: 8px;
  padding: 8px;
  background: rgba(255, 100, 100, 0.1);
  border-radius: 4px;
  color: #ff6b6b;
  font-size: 11px;
}
#help {
  position: absolute;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(20, 20, 35, 0.8);
  padding: 8px 16px;
  border-radius: 6px;
  color: #777;
  font-size: 12px;
  border: 1px solid rgba(255,255,255,0.05);
}
</style>
</head>
<body>

<div id="info">
  <h3>场景信息</h3>
  <div id="stats"></div>
  <div id="warnings"></div>
</div>

<div id="help">🖱️ 左键旋转 · 右键平移 · 滚轮缩放</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
// 场景数据注入点
const SCENE_DATA = {/* SCENE_DATA */};

(function() {
  'use strict';

  // ============================================
  // 配置验证
  // ============================================

  const warnings = [];

  function validateConfig(config) {
    if (!config.entities) {
      warnings.push('缺少 entities 配置');
      return;
    }

    config.entities.forEach((entity, index) => {
      // 验证 distribution 参数
      if (entity.distribution) {
        const dist = entity.distribution;

        if (dist.count !== undefined) {
          if (dist.count < 1) warnings.push(`实体 ${index}: count 必须大于0`);
          if (dist.count > 1000) warnings.push(`实体 ${index}: count 建议不超过1000`);
        }

        if (dist.radius !== undefined && dist.radius <= 0) {
          warnings.push(`实体 ${index}: radius 必须大于0`);
        }

        if (dist.spacing !== undefined) {
          const spacing = Array.isArray(dist.spacing) ? dist.spacing[0] : dist.spacing;
          if (spacing <= 0) warnings.push(`实体 ${index}: spacing 必须大于0`);
        }
      }

      // 验证样式
      if (entity.style) {
        if (entity.style.opacity !== undefined) {
          if (entity.style.opacity < 0 || entity.style.opacity > 1) {
            warnings.push(`实体 ${index}: opacity 建议在 0-1 之间`);
          }
        }
      }
    });

    // 验证连线
    if (config.connections) {
      const entityIds = new Set();
      config.entities.forEach(e => {
        entityIds.add(e.id);
        if (e.distribution) {
          // 预留可能的ID
          for (let i = 0; i < (e.distribution.count || 1); i++) {
            entityIds.add(`${e.id}_${i}`);
          }
        }
      });

      config.connections.forEach((conn, index) => {
        if (!conn.from) warnings.push(`连线 ${index}: 缺少 from 字段`);
        if (!conn.to) warnings.push(`连线 ${index}: 缺少 to 字段`);

        if (conn.from && !entityIds.has(conn.from)) {
          warnings.push(`连线 ${index}: from="${conn.from}" 未找到对应实体`);
        }
        if (conn.to && !entityIds.has(conn.to)) {
          warnings.push(`连线 ${index}: to="${conn.to}" 未找到对应实体`);
        }
      });
    }
  }

  // 执行验证
  validateConfig(SCENE_DATA);

  // ============================================
  // 分布配置展开逻辑
  // ============================================

  function expandEntities(entities) {
    const expanded = [];

    entities.forEach(entity => {
      if (entity.distribution) {
        const dist = entity.distribution;
        const points = calculateDistribution(dist);

        points.forEach((pos, index) => {
          expanded.push({
            id: `${entity.id}_${index}`,
            name: entity.name ? `${entity.name}-${index}` : `${entity.id}_${index}`,
            type: entity.type,
            position: pos,
            style: {...entity.style}
          });
        });
      } else {
        expanded.push(entity);
      }
    });

    return expanded;
  }

  function calculateDistribution(dist) {
    const points = [];

    switch (dist.type) {
      case 'circle':
        for (let i = 0; i < dist.count; i++) {
          const angle = ((dist.offset || 0) + i * (360 / dist.count)) * Math.PI / 180;
          points.push([
            (dist.center?.[0] || 0) + dist.radius * Math.cos(angle),
            dist.center?.[1] || 0,
            (dist.center?.[2] || 0) + dist.radius * Math.sin(angle)
          ]);
        }
        break;

      case 'grid':
        for (let r = 0; r < dist.rows; r++) {
          for (let c = 0; c < dist.cols; c++) {
            const spacing = dist.spacing;
            const sx = Array.isArray(spacing) ? spacing[0] : spacing;
            const sz = Array.isArray(spacing) ? spacing[spacing.length - 1] : spacing;

            points.push([
              (dist.center?.[0] || 0) + (c - (dist.cols - 1) / 2) * sx,
              dist.center?.[1] || 0,
              (dist.center?.[2] || 0) + (r - (dist.rows - 1) / 2) * sz
            ]);
          }
        }
        break;

      case 'line':
        for (let i = 0; i < dist.count; i++) {
          const pos = [...(dist.center || [0, 0, 0])];
          const axis = dist.axis || 'x';
          const axisIndex = {x: 0, y: 1, z: 2}[axis];
          pos[axisIndex] += i * dist.spacing;
          points.push(pos);
        }
        break;

      case 'layers':
        // 多层圆环
        if (dist.layers && Array.isArray(dist.layers)) {
          dist.layers.forEach((layer, layerIndex) => {
            const count = layer.count || 8;
            const radius = layer.radius || 10;
            const height = layer.height || 0;
            const offset = layer.offset || 0;

            for (let i = 0; i < count; i++) {
              const angle = (offset + i * (360 / count)) * Math.PI / 180;
              points.push([
                (dist.center?.[0] || 0) + radius * Math.cos(angle),
                (dist.center?.[1] || 0) + height,
                (dist.center?.[2] || 0) + radius * Math.sin(angle)
              ]);
            }
          });
        }
        break;

      default:
        console.warn(`未知的分布类型: ${dist.type}`);
    }

    return points;
  }

  // 展开所有实体
  const expandedEntities = expandEntities(SCENE_DATA.entities || []);

  // ============================================
  // Three.js 场景初始化
  // ============================================

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0a0f);

  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(...(SCENE_DATA.camera?.position || [50, 50, 50]));

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  document.body.appendChild(renderer.domElement);

  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.target.set(...(SCENE_DATA.camera?.lookAt || [0, 0, 0]));
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;
  controls.update();

  // 光照
  scene.add(new THREE.AmbientLight(0x404040, 2));

  const directional = new THREE.DirectionalLight(0xffffff, 1);
  directional.position.set(50, 100, 50);
  scene.add(directional);

  const backLight = new THREE.DirectionalLight(0x445566, 0.5);
  backLight.position.set(-50, 50, -50);
  scene.add(backLight);

  // 辅助网格
  scene.add(new THREE.GridHelper(200, 50, 0x1a1a2e, 0x11111a));

  // 坐标轴（已禁用）
  // scene.add(new THREE.AxesHelper(20));

  // ============================================
  // 实体创建
  // ============================================

  const entityMap = new Map();
  const geometries = {
    sphere: new THREE.SphereGeometry(1, 32, 32),
    cube: new THREE.BoxGeometry(1, 1, 1),
    cone: new THREE.ConeGeometry(1, 2, 32),
    cylinder: new THREE.CylinderGeometry(1, 1, 1, 32),
    point: new THREE.SphereGeometry(0.3, 16, 16),
    diamond: new THREE.OctahedronGeometry(1),
    torus: new THREE.TorusGeometry(1, 0.3, 16, 32)
  };

  function createEntity(data) {
    const group = new THREE.Group();
    const geometry = geometries[data.type] || geometries.sphere;

    const style = data.style || {};
    const material = new THREE.MeshPhongMaterial({
      color: style.color || 0x4488ff,
      transparent: style.opacity !== undefined,
      opacity: style.opacity !== undefined ? style.opacity : 1,
      wireframe: style.wireframe || false
    });

    const mesh = new THREE.Mesh(geometry, material);
    mesh.scale.setScalar(style.size !== undefined ? style.size : 1);
    group.add(mesh);

    if (data.position) {
      group.position.set(...data.position);
    }

    group.userData = { id: data.id, name: data.name || data.id };
    return group;
  }

  expandedEntities.forEach(data => {
    const entity = createEntity(data);
    entityMap.set(data.id, entity);
    scene.add(entity);
  });

  // ============================================
  // 连线创建（支持组引用）
  // ============================================

  function createLine(fromPos, toPos, style) {
    const points = [new THREE.Vector3(...fromPos), new THREE.Vector3(...toPos)];
    const geometry = new THREE.BufferGeometry().setFromPoints(points);

    const material = new THREE.LineBasicMaterial({
      color: style?.color || 0xffffff,
      transparent: true,
      opacity: style?.opacity !== undefined ? style.opacity : 0.5
    });

    if (style?.type === 'dashed') {
      const dashedMaterial = new THREE.LineDashedMaterial({
        color: style.color || 0xffffff,
        dashSize: 1,
        gapSize: 0.5,
        transparent: true,
        opacity: style?.opacity !== undefined ? style.opacity : 0.5
      });
      const line = new THREE.Line(geometry, dashedMaterial);
      line.computeLineDistances();
      return line;
    }

    return new THREE.Line(geometry, material);
  }

  // 查找实体（支持 distribution 组引用）
  function findEntities(id) {
    const entity = entityMap.get(id);
    if (entity) return [entity];

    const matched = [];
    entityMap.forEach((entity, entityId) => {
      if (entityId.startsWith(id + '_')) {
        matched.push(entity);
      }
    });
    return matched.length > 0 ? matched : null;
  }

  const connections = SCENE_DATA.connections || [];
  connections.forEach(conn => {
    const fromEntities = findEntities(conn.from);
    const toEntities = findEntities(conn.to);

    if (!fromEntities || !toEntities) {
      console.warn('连线实体未找到:', conn.from, '→', conn.to);
      return;
    }

    fromEntities.forEach(fromEntity => {
      toEntities.forEach(toEntity => {
        const fromPos = [fromEntity.position.x, fromEntity.position.y, fromEntity.position.z];
        const toPos = [toEntity.position.x, toEntity.position.y, toEntity.position.z];
        scene.add(createLine(fromPos, toPos, conn.style));
      });
    });
  });

  // ============================================
  // 信息面板更新
  // ============================================

  function updateStats() {
    const statsEl = document.getElementById('stats');
    const warningsEl = document.getElementById('warnings');
    let html = '';

    // 实体统计
    if (expandedEntities.length > 0) {
      html += '<div class="section">';
      html += '<div class="label">实体 (' + expandedEntities.length + ')</div>';
      expandedEntities.slice(0, 10).forEach(e => {
        const color = (e.style?.color || '#4488ff').replace('0x', '#');
        html += '<div class="item">';
        html += '<div class="color-dot" style="background:' + color + '"></div>';
        html += '<span>' + (e.name || e.id) + '</span>';
        html += '</div>';
      });
      if (expandedEntities.length > 10) {
        html += '<div class="item" style="color:#666">... 还有 ' + (expandedEntities.length - 10) + ' 个</div>';
      }
      html += '</div>';
    }

    // 连线统计
    if (connections.length > 0) {
      html += '<div class="section">';
      html += '<div class="label">连线 (' + connections.length + ')</div>';
      connections.slice(0, 5).forEach(c => {
        html += '<div class="item">';
        html += '<span style="color:#888">↔</span>';
        html += '<span>' + (c.name || c.id) + ': ' + c.from + ' → ' + c.to + '</span>';
        html += '</div>';
      });
      if (connections.length > 5) {
        html += '<div class="item" style="color:#666">... 还有 ' + (connections.length - 5) + ' 条</div>';
      }
      html += '</div>';
    }

    statsEl.innerHTML = html;

    // 警告信息
    if (warnings.length > 0) {
      warningsEl.innerHTML = '<div class="warning">' + warnings.join('<br>') + '</div>';
    }
  }

  updateStats();

  // ============================================
  // 动画循环
  // ============================================

  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }

  animate();

  // 窗口大小调整
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

})();
</script>
</body>
</html>
